<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}인증{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; color: #555; margin-bottom: 0.25rem; }
        input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        input:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 0.625rem; background: #4f46e5; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #4338ca; }
        .error { color: #dc2626; font-size: 0.8rem; margin-top: 0.25rem; }
        .errors { background: #fef2f2; border: 1px solid #fecaca; border-radius: 4px; padding: 0.75rem; margin-bottom: 1rem; color: #dc2626; font-size: 0.875rem; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #555; }
        .link a { color: #4f46e5; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main class="card" role="main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
