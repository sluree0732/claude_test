{% extends "accounts/base.html" %}

{% block title %}로그인{% endblock %}

{% block content %}
<h1>로그인</h1>

{% if error %}
<div class="errors">
    <p>{{ error }}</p>
</div>
{% endif %}

<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="id_username">아이디</label>
        <input type="text" id="id_username" name="username" autocomplete="username" required>
    </div>
    <div class="form-group">
        <label for="id_password">비밀번호</label>
        <input type="password" id="id_password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">로그인</button>
</form>

<p class="link">계정이 없으신가요? <a href="{% url 'accounts:register' %}">회원가입</a></p>
{% endblock %}
